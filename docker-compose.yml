version: "3.9"
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yor-talks-api
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-CHANGE_THIS_IN_PRODUCTION_USE_32_CHAR_RANDOM_STRING}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      DB_PATH: /app/data/yortalks.db
    ports:
      - "5000:5000"
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yor-talks-web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-data:
  backend-uploads:
